<!DOCTYPE html>
<html lang="en" class="scroll-smooth">
<head>
  <!-- Google tag (gtag.js) -->
  <script async src="https://www.googletagmanager.com/gtag/js?id=G-RHDH01B11E"></script>
  <script>
    window.dataLayer = window.dataLayer || [];
    function gtag(){dataLayer.push(arguments);}
    gtag('js', new Date());
    gtag('config', 'G-RHDH01B11E');
  </script>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{{ page.title }} | Elvir Kaqanolli</title>
  <!-- Meta Description (you can override in front matter) -->
  <meta name="description" content="Elvir Kaqanolli: PHP & AI Engineer – blog about backends, databases, and AI integration." />
  <meta name="robots" content="index, follow" />
  
  <!-- Preconnect to critical origins -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link rel="preconnect" href="https://cdn.tailwindcss.com" crossorigin />
  
  <!-- Google Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300..700&family=Inter:wght@300..600&display=swap" rel="stylesheet" />
  
  <!-- Critical inline styles (keep from your portfolio) -->
  <style>
    body { background-color: #030712; color: #f8fafc; overflow-x: hidden; font-family: system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif; margin: 0; }
    .font-heading { font-family: 'Space Grotesk', system-ui, sans-serif; }
    .glass { background: rgba(15, 23, 42, 0.4); backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.08); }
    .gradient-text { background: linear-gradient(to right, #818cf8, #22d3ee, #818cf8); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-size: 200% auto; animation: shimmer 4s linear infinite; }
    @keyframes shimmer { 0% { background-position: -200% 0; } 100% { background-position: 200% 0; } }
    .reveal { opacity: 0; transform: translateY(30px); transition: 1s all cubic-bezier(0.22, 1, 0.36, 1); }
    .reveal.active { opacity: 1; transform: translateY(0); }
    .reveal-group.active .reveal-item { opacity: 1; transform: translateY(0); }
    .reveal-item { opacity: 0; transform: translateY(20px); transition: 0.8s all cubic-bezier(0.22, 1, 0.36, 1); }
    details > summary { list-style: none; }
    details > summary::-webkit-details-marker { display: none; }

    /* Mobile menu */
    .mobile-menu { max-height: 0; opacity: 0; overflow: hidden; transition: max-height 0.4s ease, opacity 0.3s ease, margin 0.3s ease; }
    .mobile-menu.open { max-height: 300px; opacity: 1; margin-top: 1rem; }
  </style>
  
  <!-- Tailwind config (inline) -->
  <script>
    window.tailwind = window.tailwind || {};
    window.tailwind.config = {
      theme: {
        extend: {
          fontFamily: { sans: ['Inter', 'sans-serif'], heading: ['Space Grotesk', 'sans-serif'] },
          colors: { slate: { 950: '#030712' }, accent: { 500: '#6366f1', 400: '#818cf8' } }
        }
      }
    }
  </script>
</head>
<body class="selection:bg-indigo-500/30">

  <!-- ========== NAVBAR (same as portfolio) ========== -->
  <nav class="fixed top-6 left-1/2 -translate-x-1/2 z-50 w-[90%] max-w-4xl">
    <div class="glass px-6 py-3 rounded-2xl flex flex-wrap items-center justify-between shadow-2xl relative">
      <a href="/" class="font-heading font-bold text-xl tracking-tighter">Elvir<span class="text-accent-400"> K</span></a>
      
      <!-- Desktop navigation -->
      <div class="hidden md:flex gap-8 text-sm font-medium text-slate-400">
        <a href="/#services" class="hover:text-white transition-colors">Services</a>
        <a href="/#projects" class="hover:text-white transition-colors">Work</a>
        <a href="/#stack" class="hover:text-white transition-colors">Stack</a>
        <a href="/#scripts-seo" class="hover:text-white transition-colors">Scripts/SEO</a>
        <a href="/#faq" class="hover:text-white transition-colors">FAQ</a>
        <a href="/blog/" class="text-white font-semibold">Blog</a>
      </div>

      <!-- Right side: CTA + mobile hamburger -->
      <div class="flex items-center gap-3">
        <a href="/#contact" class="bg-white text-black px-4 py-2 rounded-xl text-xs font-bold hover:bg-accent-400 transition-all whitespace-nowrap">LET'S TALK</a>
        
        <!-- Mobile menu button -->
        <button id="mobileMenuBtn" aria-label="Toggle navigation menu" class="md:hidden w-10 h-10 flex items-center justify-center rounded-xl glass hover:bg-white/10 transition-all">
          <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"></path>
          </svg>
        </button>
      </div>

      <!-- Mobile menu dropdown -->
      <div id="mobileMenu" class="mobile-menu w-full md:hidden flex flex-col glass rounded-xl px-4 text-slate-400 font-medium">
        <a href="/#services" class="py-3 border-b border-white/5 hover:text-white transition-colors">Services</a>
        <a href="/#projects" class="py-3 border-b border-white/5 hover:text-white transition-colors">Work</a>
        <a href="/#stack" class="py-3 border-b border-white/5 hover:text-white transition-colors">Stack</a>
        <a href="/#scripts-seo" class="py-3 border-b border-white/5 hover:text-white transition-colors">Scripts/SEO</a>
        <a href="/#faq" class="py-3 hover:text-white transition-colors">FAQ</a>
        <a href="/blog/" class="py-3 text-white font-semibold">Blog</a>
      </div>
    </div>
  </nav>

  <!-- Main content area (adds top padding to clear fixed navbar) -->
  <main class="pt-32 pb-20">
    {{ content }}
  </main>

  <!-- Footer (same as portfolio) -->
  <footer class="py-12 border-t border-white/5 text-center">
    <p class="text-[10px] text-slate-400 font-mono uppercase tracking-[0.5em]">© 2026 ELVIR KAQANOLLI • STACK: PHP 8.3 / MYSQL / TAILWIND / AI</p>
  </footer>

  <!-- Defer Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com" defer></script>

  <!-- Mobile menu script (same as portfolio) -->
  <script>
    const menuBtn = document.getElementById('mobileMenuBtn');
    const mobileMenu = document.getElementById('mobileMenu');
    if (menuBtn && mobileMenu) {
      menuBtn.addEventListener('click', (e) => {
        e.stopPropagation();
        mobileMenu.classList.toggle('open');
      });
      mobileMenu.querySelectorAll('a').forEach(link => {
        link.addEventListener('click', () => mobileMenu.classList.remove('open'));
      });
      document.addEventListener('click', (e) => {
        if (!menuBtn.contains(e.target) && !mobileMenu.contains(e.target) && mobileMenu.classList.contains('open')) {
          mobileMenu.classList.remove('open');
        }
      });
    }

    // Intersection observer for reveal animations (optional, can be removed if not needed on blog)
    const observer = new IntersectionObserver((entries) => {
      entries.forEach(entry => { if (entry.isIntersecting) entry.target.classList.add('active'); });
    }, { threshold: 0.1 });
    document.querySelectorAll('.reveal, .reveal-group').forEach(el => observer.observe(el));
  </script>
</body>
</html>
