---
layout: default
title: Blog
---

<div class="container mx-auto px-4 py-8 max-w-3xl">
  <h1 class="text-4xl font-bold mb-8 text-gray-900">Blog</h1>

  <ul class="space-y-6">
    {% for post in site.posts %}
    <li class="border-b border-gray-200 pb-4 last:border-0">
      <a href="{{ post.url }}" class="block group">
        <h2 class="text-xl font-semibold text-gray-800 group-hover:text-blue-600 transition-colors">
          {{ post.title }}
        </h2>
        <span class="text-sm text-gray-500 mt-1 block">
          {{ post.date | date: "%B %d, %Y" }}
        </span>
      </a>
    </li>
    {% endfor %}
  </ul>
</div>
